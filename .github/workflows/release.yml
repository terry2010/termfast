name: Release

# Build, sign and publish Tauri desktop bundles for Windows + macOS,
# create a GitHub Release, and deploy the updater manifest (latest.json)
# to the gh-pages branch so the in-app auto-updater can fetch it.
#
# Trigger: push a semver tag like v0.1.0

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.1.2)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # === Build signed bundles for each desktop platform ===
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    continue-on-error: ${{ matrix.platform == 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is missing. See AGENTS.md § Release setup."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          # Tauri v2 on macOS usually has everything it needs on the runner,
          # but keep this step as a hook for future universal-binary tooling.
          true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Tauri release bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: ${{ inputs.tag || github.ref_name }}
          releaseBody: "See the assets below to download this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # === Build signed Android APK ===
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing."
            echo "Run: base64 -i android/app/keystores/release.keystore"
            echo "Add the output as a GitHub Secret named ANDROID_KEYSTORE_BASE64"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: ''
      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.3.13750724"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystores
          # Remove any whitespace/newlines from the base64 string before decoding
          CLEANED=$(echo "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]')
          echo "$CLEANED" | base64 --decode > android/app/keystores/release.keystore
          if [ ! -s android/app/keystores/release.keystore ]; then
            echo "::error::Keystore file is empty after decode. Check ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          ls -la android/app/keystores/release.keystore
          file android/app/keystores/release.keystore

      - name: Build Rust .so (release)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.3.13750724
        run: |
          NDK_TOOLCHAIN="${ANDROID_SDK_ROOT}/ndk/27.3.13750724/toolchains/llvm/prebuilt/linux-x86_64/bin"
          # Remove the macOS-specific .cargo/config.toml so it doesn't interfere
          rm -f .cargo/config.toml
          # Set environment variables for cc/ring crates
          export CC_aarch64_linux_android="${NDK_TOOLCHAIN}/aarch64-linux-android26-clang"
          export AR_aarch64_linux_android="${NDK_TOOLCHAIN}/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/aarch64-linux-android26-clang"

          cargo build --release --target aarch64-linux-android -p termfast-android-ffi
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libtermfast_android_ffi.so \
             android/app/src/main/jniLibs/arm64-v8a/libtermfast_android_ffi.so
          STRIP=$(find ${ANDROID_SDK_ROOT}/ndk -name llvm-strip -path '*linux-x86_64*' | head -1)
          if [ -n "$STRIP" ]; then
            "$STRIP" --strip-debug android/app/src/main/jniLibs/arm64-v8a/libtermfast_android_ffi.so
          fi

      - name: Create local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties

      - name: Build release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/TermFast-${VERSION}-android-arm64.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body: "See the assets below to download this version."
          draft: true
          prerelease: false
          files: android/TermFast-*-android-arm64.apk

  # === Generate latest.json from the signed release assets and deploy to gh-pages ===
  update-manifest:
    needs: [build, build-android]
    if: always() && !cancelled()
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wait for release to be available
        run: sleep 60

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ inputs.tag || github.ref_name }}
        run: node scripts/generate-latest-json.mjs

      - name: Deploy latest.json to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true

  # === Publish the draft release once the manifest is live ===
  publish-release:
    needs: update-manifest
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ inputs.tag || github.ref_name }} --draft=false --repo ${{ github.repository }}
